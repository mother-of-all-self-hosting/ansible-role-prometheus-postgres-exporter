---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
    force: true
driver:
  name: docker
platforms:
  - name: prometheus-postgres-exporter-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Helper variables
        prometheus_postgres_exporter_debug_service_enabled: false

        # Variables for Prometheus Postgres exporter
        prometheus_postgres_exporter_uid: 1000
        prometheus_postgres_exporter_gid: 1000
        prometheus_postgres_exporter_hostname: localhost
        prometheus_postgres_exporter_container_labels_metrics_enabled: false
        prometheus_postgres_exporter_container_http_host_bind_port: 9187

        # Variables required for Prometheus Postgres exporter to connect to the Postgres database
        prometheus_postgres_exporter_database_hostname: "{{ postgres_connection_hostname }}"
        prometheus_postgres_exporter_database_port: "{{ postgres_connection_port }}"
        prometheus_postgres_exporter_database_password: "{{ postgres_connection_password }}"
        prometheus_postgres_exporter_database_sslmode: disable
        prometheus_postgres_exporter_database_name: "prometheus_postgres_exporter"
        prometheus_postgres_exporter_systemd_required_services_list_auto: |
          {{
            (['postgres.service'])
          }}

        # Variables for Postgres
        postgres_uid: 1000
        postgres_gid: 1000
        postgres_connection_password: postgres_password
        postgres_container_network: "{{ prometheus_postgres_exporter_container_network }}"
        postgres_managed_databases: |
          {{
            [{
              'name': prometheus_postgres_exporter_database_name,
              'username': prometheus_postgres_exporter_database_username,
              'password': prometheus_postgres_exporter_database_password
            }]
          }}
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
scenario:
  # See: https://docs.ansible.com/projects/molecule/configuration/?h=test_sequence#scenario
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Disable idempotence test for now due to ansible-role-postgres
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
